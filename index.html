<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>D'brief Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0C0C12;color:#fff;font-family:system-ui,sans-serif}
.P{position:absolute;inset:0;display:none;flex-direction:column}
.P.on{display:flex}
</style>
</head>
<body>
<div id="splash" class="P on" style="align-items:center;justify-content:center;text-align:center;padding:32px">
<div style="font-size:48px;font-weight:900;background:linear-gradient(135deg,#FF7A2E,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:24px">D'brief</div>
<div style="margin-bottom:32px;color:rgba(255,255,255,.4)">Test - les boutons marchent ?</div>
<button onclick="go('signup')" style="width:100%;max-width:300px;padding:16px;background:linear-gradient(135deg,#FF7A2E,#FFA04E);border:none;border-radius:14px;color:#fff;font-size:17px;font-weight:800;cursor:pointer;margin-bottom:10px">Créer un compte</button>
<button onclick="go('login')" style="width:100%;max-width:300px;padding:16px;background:#1E1E2E;border:1.5px solid rgba(255,255,255,.08);border-radius:14px;color:#fff;font-size:17px;font-weight:800;cursor:pointer">Se connecter</button>
</div>
<div id="signup" class="P" style="align-items:center;justify-content:center;text-align:center;padding:32px">
<div style="font-size:28px;font-weight:900;margin-bottom:24px">Créer un compte</div>
<div style="color:#4ECB71;font-size:18px;margin-bottom:24px">✓ LES BOUTONS MARCHENT !</div>
<button onclick="go('splash')" style="padding:14px 32px;background:#1E1E2E;border:1.5px solid rgba(255,255,255,.08);border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer">Retour</button>
</div>
<div id="login" class="P" style="align-items:center;justify-content:center;text-align:center;padding:32px">
<div style="font-size:28px;font-weight:900;margin-bottom:24px">Se connecter</div>
<div style="color:#4ECB71;font-size:18px;margin-bottom:24px">✓ LES BOUTONS MARCHENT !</div>
<button onclick="go('splash')" style="padding:14px 32px;background:#1E1E2E;border:1.5px solid rgba(255,255,255,.08);border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer">Retour</button>
</div>
<script>
function go(id){document.querySelectorAll('.P').forEach(function(p){p.classList.remove('on')});document.getElementById(id).classList.add('on')}
</script>
</body>
</html>
