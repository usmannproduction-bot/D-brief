
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="theme-color" content="#0a0a12">
    <title>D'brief</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <style>
        /* Les styles CSS restent inchangés */
        *{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}
        body{font-family:'Outfit',sans-serif;color:#F0F0F5;background:#0a0a12}
        #app{width:min(430px,100vw);height:100dvh;margin:0 auto;position:relative;overflow:hidden}
        .P{position:absolute;inset:0;display:none;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}.P.on{display:flex}
        .btn{width:100%;padding:16px;border-radius:16px;border:none;font-size:17px;font-weight:800;cursor:pointer;font-family:'Outfit',sans-serif}.btn:active{opacity:.85}
        .bp{background:linear-gradient(135deg,#FF7A2E,#FFA04E);color:#fff;box-shadow:0 4px 24px rgba(255,122,46,.35)}
        .bp2{background:linear-gradient(135deg,#FF7A2E,#FFA04E,#A78BFA);color:#fff;box-shadow:0 4px 20px rgba(255,122,46,.3)}
        .bs{background:#1c1c2e;color:#F0F0F5;border:1.5px solid rgba(255,255,255,.06)}
        .inp{width:100%;padding:13px 16px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.07);border-radius:12px;color:#fff;font-size:15px;font-family:'Outfit',sans-serif;margin-bottom:8px}.inp:focus{border-color:#FF7A2E;outline:none}.inp::placeholder{color:rgba(255,255,255,.2)}
        .tab{display:flex;border-top:1px solid rgba(255,255,255,.04);background:#0a0a12;flex-shrink:0}.ti{flex:1;text-align:center;padding:10px 0;cursor:pointer}.ti span{font-size:11px;font-weight:700;color:#555}.ti.on span{color:#FF7A2E}
    </style>
</head>
<body>
    <div id="app">
        <!-- SPLASH -->
        <div class="P on" id="splash" style="align-items:center;justify-content:center;padding:32px;text-align:center;background:#0a0a12">
            <div style="font-size:46px;font-weight:900;margin-bottom:12px;background:linear-gradient(135deg,#FF7A2E,#e8a0b0,#A78BFA);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent">D'brief</div>
            <div style="font-size:15px;color:rgba(255,255,255,.3);margin-bottom:44px">Défendez vos personnages préférés</div>
            <div style="width:100%;max-width:340px">
                <button class="btn bp" style="margin-bottom:10px" onclick="go('signup')">Créer un compte</button>
                <button class="btn bs" onclick="go('login')">Se connecter</button>
            </div>
        </div>

        <!-- SIGNUP -->
        <div class="P" id="signup" style="background:#0a0a12">
            <div style="flex:1;display:flex;flex-direction:column;padding:20px;justify-content:center">
                <div style="font-size:24px;font-weight:900;margin-bottom:16px">Créer un compte</div>
                <input class="inp" id="su-n" placeholder="Votre nom">
                <input class="inp" id="su-e" type="email" placeholder="E-mail">
                <input class="inp" id="su-p" type="password" placeholder="Mot de passe (6 car.)">
                <div id="su-err" style="display:none;font-size:12px;margin-bottom:6px;color:#FF4757;"></div>
                <button class="btn bp" style="margin-bottom:8px" onclick="doSignup()">S'inscrire</button>
                <button class="btn bs" onclick="go('splash')">Retour</button>
            </div>
        </div>

        <!-- LOGIN -->
        <div class="P" id="login" style="background:#0a0a12">
            <div style="flex:1;display:flex;flex-direction:column;padding:20px;justify-content:center">
                <div style="font-size:24px;font-weight:900;margin-bottom:16px">Se connecter</div>
                <input class="inp" id="li-e" type="email" placeholder="E-mail">
                <input class="inp" id="li-p" type="password" placeholder="Mot de passe">
                <div id="li-err" style="display:none;font-size:12px;margin-bottom:6px;color:#FF4757;"></div>
                <button class="btn bp" style="margin-bottom:8px" onclick="doLogin()">Connexion</button>
                <button class="btn bs" onclick="go('splash')">Retour</button>
            </div>
        </div>
    </div>

    <script>
        // Remplace UNIQUEMENT la valeur ci-dessous par ta clé API Firebase (la longue chaîne de caractères)
        const API_KEY = "AIzaSyCAsL1P1YDGWfZMBzQdZdp4xd6zjgoGK9g"

        const firebaseConfig = {
            apiKey: API_KEY,
            authDomain: API_KEY ? `${API_KEY.split(':')[1].split('.')[0]}.firebaseapp.com` : "ton-projet.firebaseapp.com",
            projectId: API_KEY ? API_KEY.split(':')[1].split('.')[0] : "ton-projet",
            storageBucket: API_KEY ? `${API_KEY.split(':')[1].split('.')[0]}.appspot.com` : "ton-projet.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:aaaaaaaaaaaaaaaaaaaaaa"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Fonction pour naviguer entre les pages
        function go(id) {
            document.querySelectorAll('.P').forEach(function(p) { p.classList.remove('on'); });
            document.getElementById(id).classList.add('on');
        }

        // Fonction pour s'inscrire
        async function doSignup() {
            const name = document.getElementById('su-n').value;
            const email = document.getElementById('su-e').value;
            const password = document.getElementById('su-p').value;

            if (!name || !email || !password) {
                document.getElementById('su-err').textContent = 'Veuillez remplir tous les champs obligatoires.';
                document.getElementById('su-err').style.display = 'block';
                return;
            }

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                alert("Compte créé avec succès !");
                go('login');
            } catch (error) {
                document.getElementById('su-err').textContent = error.message;
                document.getElementById('su-err').style.display = 'block';
            }
        }

        // Fonction pour se connecter
        async function doLogin() {
            const email = document.getElementById('li-e').value;
            const password = document.getElementById('li-p').value;

            if (!email || !password) {
                document.getElementById('li-err').textContent = 'Veuillez remplir tous les champs.';
                document.getElementById('li-err').style.display = 'block';
                return;
            }

            try {
                await auth.signInWithEmailAndPassword(email, password);
                alert("Connexion réussie !");
            } catch (error) {
                document.getElementById('li-err').textContent = error.message;
                document.getElementById('li-err').style.display = 'block';
            }
        }
    </script>
</body>
</html>
